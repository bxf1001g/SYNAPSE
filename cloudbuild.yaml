# cloudbuild.yaml — Auto-deploy SYNAPSE to Cloud Run on push
#
# Setup: Connect this repo in Cloud Build → Triggers
#   Trigger on: Push to main branch
#   This will auto-build and deploy when agents merge self-evolution PRs
#
# Required substitutions (set in trigger or as defaults):
#   _SERVICE_NAME: synapse
#   _REGION: us-central1

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--session-affinity'
      - '--timeout=300'
      - '--concurrency=10'
      - '--min-instances=1'
      - '--use-http2=false'
      - '--set-env-vars=SYNAPSE_CLOUD_MODE=1'

substitutions:
  _SERVICE_NAME: synapse
  _REGION: us-central1

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
