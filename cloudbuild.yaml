# cloudbuild.yaml — Auto-deploy SYNAPSE to Cloud Run on push
#
# Setup: Connect this repo in Cloud Build → Triggers
#   Trigger on: Push to main branch
#   This will auto-build and deploy when agents merge self-evolution PRs
#
# Required substitutions (set in trigger or as defaults):
#   _SERVICE_NAME: synapse
#   _REGION: us-central1

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy ${_SERVICE_NAME} \
          --image=gcr.io/$PROJECT_ID/${_SERVICE_NAME} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --timeout=300 \
          --memory=1Gi \
          --cpu=1 \
          --min-instances=1 \
          --max-instances=1 \
          --startup-probe httpGet.path=/health,initialDelaySeconds=5,timeoutSeconds=10,failureThreshold=10,periodSeconds=10 \
          --set-env-vars=SYNAPSE_CLOUD_MODE=1,GCP_PROJECT=$PROJECT_ID,GEMINI_API_KEY=${_GEMINI_API_KEY},GITHUB_TOKEN=${_GITHUB_TOKEN},GITHUB_REPO=${_GITHUB_REPO},MOLTBOOK_API_KEY=${_MOLTBOOK_API_KEY},TELEGRAM_BOT_TOKEN=${_TELEGRAM_BOT_TOKEN},TELEGRAM_CHAT_ID=${_TELEGRAM_CHAT_ID},REDDIT_CLIENT_ID=${_REDDIT_CLIENT_ID},REDDIT_CLIENT_SECRET=${_REDDIT_CLIENT_SECRET},REDDIT_USERNAME=${_REDDIT_USERNAME},REDDIT_PASSWORD=${_REDDIT_PASSWORD},DISCORD_BOT_TOKEN=${_DISCORD_BOT_TOKEN},DISCORD_CHANNEL_NAME=${_DISCORD_CHANNEL_NAME}

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _SERVICE_NAME: synapse
  _REGION: us-central1
  _GEMINI_API_KEY: ''
  _GITHUB_TOKEN: ''
  _GITHUB_REPO: 'https://github.com/bxf1001g/SYNAPSE'
  _MOLTBOOK_API_KEY: ''
  _TELEGRAM_BOT_TOKEN: ''
  _TELEGRAM_CHAT_ID: ''
  _REDDIT_CLIENT_ID: ''
  _REDDIT_CLIENT_SECRET: ''
  _REDDIT_USERNAME: ''
  _REDDIT_PASSWORD: ''
  _DISCORD_BOT_TOKEN: ''
  _DISCORD_CHANNEL_NAME: 'chats'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
